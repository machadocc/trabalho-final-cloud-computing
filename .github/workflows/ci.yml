name: Pipeline de Integração Contínua (CI) - UNIDAVI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código fonte
      uses: actions/checkout@v4

    - name: Configurar ambiente Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependências da aplicação
      run: |
        python -m pip install --upgrade pip
        pip install -r api/requirements.txt

    - name: Executar Análise Estática de Código (Lint com Flake8)
      run: |
        flake8 api/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 api/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Executar Suíte de Testes Unitários
      run: |
        pytest api/tests/ -v